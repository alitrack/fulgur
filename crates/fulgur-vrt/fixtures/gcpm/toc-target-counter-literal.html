<!DOCTYPE html>
<html>
<head>
<!--
  fulgur-11gd: VRT fixture for target-counter() with a literal URL.
  The pseudo-element does not read href; it resolves the hard-coded
  fragment directly.
-->
<style>
@page { size: A5; margin: 18mm; }
body { font: 12pt 'Noto Sans', sans-serif; }
.ref::after { content: " p." target-counter("#chapter", page); }
</style>
</head>
<body>
<p class="ref">Chapter starts on</p>
<h1 id="chapter" style="page-break-before: always">Chapter</h1>
<p>Lorem ipsum.</p>
</body>
</html>
