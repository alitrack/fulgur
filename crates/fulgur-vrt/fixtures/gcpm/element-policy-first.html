<!DOCTYPE html>
<html>
<head>
<style>
@page {
  size: 400pt 300pt;
  margin: 40pt;
  @top-center { content: "first: " element(title, first); font-size: 9pt; color: #555; }
}
body { font-family: sans-serif; font-size: 11pt; line-height: 1.6; margin: 0; }
.title { position: running(title); border-bottom: 1pt solid #999; padding-bottom: 4pt; }
.spacer { height: 220pt; margin: 8pt 0; border: 1pt solid #ddd; background: #f9f9f9; }
</style>
</head>
<body>
<div class="title">First Policy Chapter One</div>
<div class="spacer">First-policy block on page one.</div>

<div style="page-break-before: always"></div>
<div class="title">First Policy Chapter Two</div>
<div class="spacer">First-policy block on page two.</div>

<div style="page-break-before: always"></div>
<div class="title">First Policy Chapter Three</div>
<div class="spacer">First-policy block on page three.</div>
</body>
</html>
