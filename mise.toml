[tools]
rust = "latest"
python = "3.12"
uv = "latest"

[tasks.update-examples]
description = "Regenerate all example PDFs"
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo build --bin fulgur --release
mkdir -p target/fontconfig-cache
rm -rf target/fontconfig-cache/*
export FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf"
for dir in examples/*/; do
  html="$dir/index.html"
  pdf="$dir/index.pdf"
  [ -f "$html" ] || continue
  # Skip hidden directories (.fonts, .fontconfig).
  [ "${dir#examples/.}" = "$dir" ] || continue
  args=()
  for img in "${dir}"*.png "${dir}"*.jpg "${dir}"*.gif "${dir}"*.svg; do
    [ -f "$img" ] || continue
    args+=(--image "$(basename "$img")=$img")
  done
  if [ -f "${dir}fulgur.args" ]; then
    while IFS= read -r line; do
      [[ -z "$line" || "$line" == '#'* ]] && continue
      set -f; args+=($line); set +f
    done < "${dir}fulgur.args"
  fi
  target/release/fulgur render "$html" "${args[@]}" -o "$pdf"
done
"""

[tasks.wasm-build]
description = "Build the size-optimised fulgur-wasm bundle into examples/wasm-demo/pkg"
run = """
#!/usr/bin/env bash
set -euo pipefail
# Size-optimised WASM build (~7 MB vs ~11 MB for a plain --release and ~37 MB
# for --dev). The CARGO_PROFILE_RELEASE_* env vars override the shared release
# profile for THIS invocation only, so the CLI's native release tuning is never
# touched (cargo reads these env vars; the wasm-opt flags live in
# crates/fulgur-wasm/Cargo.toml under [package.metadata.wasm-pack.profile.release]).
# panic=abort is safe here: fulgur-wasm returns errors via Result<_, JsError>
# and uses no catch_unwind, and wasm32-unknown-unknown cannot unwind anyway.
export CARGO_PROFILE_RELEASE_OPT_LEVEL=z
export CARGO_PROFILE_RELEASE_PANIC=abort
export CARGO_PROFILE_RELEASE_LTO=fat
export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
export CARGO_PROFILE_RELEASE_STRIP=true
wasm-pack build crates/fulgur-wasm --target web --release \\
  --out-dir ../../examples/wasm-demo/pkg
"""

[tasks."wpt:fetch"]
description = "Fetch WPT sources into target/wpt/ (pinned SHA)"
run = "scripts/wpt/fetch.sh"

[tasks."wpt:run-one"]
description = "Run a single WPT reftest (usage: mise run wpt:run-one -- <test.html> [--dpi N])"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [ $# -eq 0 ]; then
  echo "usage: mise run wpt:run-one -- <test.html> [--dpi N]" >&2
  echo "  test.html: path under target/wpt/ or absolute" >&2
  exit 1
fi
export FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf"
cargo run -p fulgur-wpt --example run_one -- "$@"
"""

[tasks."docs:install"]
description = "Install website Python deps via uv"
dir = "website"
run = "uv sync"

[tasks."docs:serve"]
description = "Run MkDocs dev server (http://127.0.0.1:8000)"
dir = "website"
depends = ["docs:install"]
run = "uv run mkdocs serve"

[tasks."docs:build"]
description = "Build static site to website/site/"
dir = "website"
depends = ["docs:install"]
run = "uv run mkdocs build --strict"
